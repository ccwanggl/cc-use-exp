interface:
  display_name: "cc-task-state"
  short_description: "沉淀任务状态、打断点和恢复入口，避免进展只留在对话里。"
  default_prompt: "Use $cc-task-state to turn the user's natural-language progress update into project-local .codex/tasks state. First ensure the project-local tasks directories are actually writable from the current session, request the platform approval path if project-local initialization hits a permission boundary, and only describe a fallback when the project directory is still not writable after that path. Split multiple task subjects into separate task records, keep not-started work as 需求中 or 待开始 instead of 进行中, add interruption checkpoints before context-switching into fixes, and record a concrete resume entry plus next step."
policy:
  allow_implicit_invocation: false
