interface:
  display_name: "new-feature"
  short_description: "显式推进新功能：需求澄清、设计、实现、验证与恢复。"
  default_prompt: "Use $new-feature to first ensure the project-local .codex/tasks and .codex/tasks/archived directories exist by actually attempting mkdir -p .codex/tasks/archived when needed. Do not treat a missing directory as equivalent to not writable. If creating the project-local .codex skeleton hits a workspace permission boundary, request the platform's approval prompt for the mkdir action instead of only reporting the directory as not writable. Then scan .codex/tasks and immediately move any task files already marked completed into .codex/tasks/archived. Check for resumable tasks in .codex/tasks, ignoring .codex/tasks/archived, and verify the current session can write the project-local .codex/tasks only after the directory exists. Only if the project directory is truly not writable even after the approval path should you explicitly report the persistence constraint and fall back to ~/.codex/tasks. Ask the minimum clarifying questions for scope, edge cases, and dependencies, keep the active task file updated during implementation, and move it into the matching archived directory after finishing."
policy:
  allow_implicit_invocation: false
